  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

       <span style=\"{{ st.circleStyle }}\">{{ st.mark }}<\u002Fspan>\n            <span style=\"{{ st.labelStyle }}\">{{ st.label }}<\u002Fspan>\n          <\u002Fbutton>\n          <span style=\"{{ st.lineStyle }}\"><\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:32px 48px 80px; max-width:1180px;\">\n\n      <!-- ============ SCREEN 1 · ЦЕЛЬ ============ -->\n      <sc-if value=\"{{ showWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n        <div style=\"max-width:680px;\">\n          <h2 style=\"margin:0 0 12px; font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.15;\">Чего хотите добиться от своей базы?<\u002Fh2>\n          <p style=\"margin:0 0 28px; font-size:16px; line-height:1.55; color:#5c5f67;\">Выберите цель простыми словами. Не нужно строить сегменты, сценарии и A/B-тесты — агент сделает это сам и покажет результат в деньгах.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:760px;\">\n          <div onclick=\"{{ pickRepeat }}\" style=\"{{ cRepeatCard }}\">\n            <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n              <div style=\"{{ cRepeatIcon }}\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M17 1l4 4-4 4M21 5H9a4 4 0 0 0-4 4v1M7 23l-4-4 4-4M3 19h12a4 4 0 0 0 4-4v-1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <sc-if value=\"{{ cRepeatBadge }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"font-size:11px; font-weight:800; letter-spacing:.03em; color:#16985a; background:#e7f8ef; padding:5px 10px; border-radius:8px;\">РЕКОМЕНДУЕМ<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <h3 style=\"margin:16px 0 6px; font-size:18px; font-weight:700;\">Растить повторные покупки<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#5c5f67; line-height:1.5;\">Превратить разовых покупателей в постоянных. Лучший старт на ваших данных.<\u002Fp>\n            <sc-if value=\"{{ cRepeatSel }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-size:13px; font-weight:700; color:#16985a;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Выбрано<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div onclick=\"{{ pickReactivate }}\" style=\"{{ cReactCard }}\">\n            <div style=\"display:flex; justify-content:flex-start; align-items:flex-start;\">\n              <div style=\"{{ cReactIcon }}\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M20.5 13.2A8 8 0 1 1 10.8 3.5 6.2 6.2 0 0 0 20.5 13.2Z\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"margin:16px 0 6px; font-size:18px; font-weight:700;\">Вернуть спящих клиентов<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#5c5f67; line-height:1.5;\">Разбудить тех, кто давно не покупал.<\u002Fp>\n            <sc-if value=\"{{ cReactSel }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-size:13px; font-weight:700; color:#16985a;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Выбрано<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div onclick=\"{{ pickChurn }}\" style=\"{{ cChurnCard }}\">\n            <div style=\"display:flex; justify-content:flex-start; align-items:flex-start;\">\n              <div style=\"{{ cChurnIcon }}\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M12 3a9 9 0 1 0 9 9M12 7v5l3 2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"margin:16px 0 6px; font-size:18px; font-weight:700;\">Снизить отток<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#5c5f67; line-height:1.5;\">Удержать тех, кто вот-вот перестанет покупать.<\u002Fp>\n            <sc-if value=\"{{ cChurnSel }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-size:13px; font-weight:700; color:#16985a;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Выбрано<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div onclick=\"{{ pickAov }}\" style=\"{{ cAovCard }}\">\n            <div style=\"display:flex; justify-content:flex-start; align-items:flex-start;\">\n              <div style=\"{{ cAovIcon }}\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\"><path d=\"M3 6h18M6 6v13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6M9 10v6M15 10v6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n            <h3 style=\"margin:16px 0 6px; font-size:18px; font-weight:700;\">Поднять средний чек<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#5c5f67; line-height:1.5;\">Продавать больше тем, кто уже покупает.<\u002Fp>\n            <sc-if value=\"{{ cAovSel }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-size:13px; font-weight:700; color:#16985a;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Выбрано<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; gap:18px; margin-top:26px; padding:18px 22px; max-width:760px; background:#fafafa; border:1px solid #ededf0; border-radius:16px;\">\n          <div style=\"flex:1; font-size:15px; color:#46484f;\">Цель: <b>{{ goalSummary }}<\u002Fb> за квартал.<\u002Fdiv>\n          <button onclick=\"{{ goImport }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:14px 24px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\">Продолжить<svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 2 · ДАННЫЕ ============ -->\n      <sc-if value=\"{{ showImport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n        <div style=\"max-width:680px;\">\n          <h2 style=\"margin:0 0 12px; font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.15;\">Подключите данные о заказах<\u002Fh2>\n          <p style=\"margin:0 0 28px; font-size:16px; line-height:1.55; color:#5c5f67;\">Достаточно обычной выгрузки заказов из Excel. Агент работает даже с неполными данными — недостающие поля не помешают старту.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:18px; max-width:880px;\">\n          <!-- uploaded file (done) -->\n          <div style=\"border:1.5px solid #2dc56e; background:#f3fbf6; border-radius:18px; padding:24px;\">\n            <div style=\"display:flex; align-items:center; gap:14px;\">\n              <div style=\"width:46px; height:46px; border-radius:12px; background:#fff; border:1px solid #d6efe0; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"1.8\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M14 3v5h5M9 14l2 2 4-4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:15.5px; font-weight:700;\">Заказы_2026.xlsx<\u002Fdiv>\n                <div style=\"font-size:13px; color:#16985a; font-weight:600;\">Загружено · 18 240 клиентов · 47 310 заказов<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width:26px; height:26px; border-radius:50%; background:#2dc56e; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:20px; border-top:1px dashed #cfead9; padding-top:18px;\">\n              <div style=\"font-size:13px; font-weight:700; color:#16985a; text-transform:uppercase; letter-spacing:.04em; margin-bottom:12px;\">Агент распознал поля<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:9px;\">\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Телефон / email <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">ключ клиента<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Дата заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">14 месяцев истории<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Сумма заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">средний чек 4 280 ₽<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Состав заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">для рекомендаций<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px; color:#8b8d93;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#c5c6cb\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Город — не найден <span style=\"margin-left:auto; font-size:13px;\">необязательно<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- connectors + consents -->\n          <div style=\"display:flex; flex-direction:column; gap:18px;\">\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:22px;\">\n              <div style=\"font-size:15px; font-weight:700; margin-bottom:4px;\">Или подключите источник<\u002Fdiv>\n              <p style=\"margin:0 0 14px; font-size:13.5px; color:#8b8d93; line-height:1.5;\">Без программиста — обновление данных по расписанию.<\u002Fp>\n              <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n                <sc-for list=\"{{ connectors }}\" as=\"cn\" hint-placeholder-count=\"5\">\n                  <button onclick=\"{{ cn.onClick }}\" style=\"{{ cn.style }}\">{{ cn.name }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-if value=\"{{ connectorPicked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-top:14px; padding:11px 13px; background:#f3fbf6; border:1px solid #d6efe0; border-radius:11px; font-size:13px; color:#16985a; font-weight:600;\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ connectorNote }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:22px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"1.8\"><path d=\"M12 3 5 6v5c0 4 3 7 7 8 4-1 7-4 7-8V6l-7-3Z\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"m9 12 2 2 4-4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Согласия проверены<\u002Fdiv>\n              <p style=\"margin:10px 0 0; font-size:14px; color:#5c5f67; line-height:1.55;\"><b style=\"color:#16181d;\">16 980 из 18 240<\u002Fb> клиентов можно писать. Остальные и стоп-листы агент исключит автоматически.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; gap:14px; margin-top:24px;\">\n          <button onclick=\"{{ goWelcome }}\" style=\"background:#fff; color:#46484f; border:1px solid #dcdce0; border-radius:12px; padding:14px 20px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;\">Назад<\u002Fbutton>\n          <button onclick=\"{{ goAnalyzing }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:14px 24px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg>Анализировать данные<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 3 · АНАЛИЗ ============ -->\n      <sc-if value=\"{{ showAnalyzing }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease; max-width:720px; margin:0 auto; padding-top:8px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <div style=\"width:74px; height:74px; border-radius:21px; background:linear-gradient(135deg,#2dc56e,#13a356); display:flex; align-items:center; justify-content:center; animation:pulseGlow 1.8s ease-in-out infinite;\"><svg width=\"36\" height=\"36\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h2 style=\"margin:22px 0 8px; font-size:26px; font-weight:800; letter-spacing:-.02em;\">Пульс изучает вашу базу<\u002Fh2>\n          <p style=\"margin:0; font-size:15.5px; color:#5c5f67;\">Объединяет заказы, считает поведение и ищет точки роста под вашу цель.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"height:6px; background:#eee; border-radius:99px; margin:28px 0 22px; overflow:hidden;\">\n          <div style=\"{{ progressStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #ededf0; border-radius:18px; padding:10px 8px;\">\n          <sc-for list=\"{{ logLines }}\" as=\"ln\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex; align-items:center; gap:13px; padding:13px 16px; animation:fadeUp .4s ease both;\">\n              <span style=\"width:26px; height:26px; border-radius:8px; background:#e7f8ef; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.6\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-size:14.5px; color:#2c2e34;\">{{ ln.text }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ analyzing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:13px; padding:13px 16px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex:none;\"><span style=\"width:16px; height:16px; border:2.4px solid #d9efe2; border-top-color:#2dc56e; border-radius:50%; animation:spin .7s linear infinite;\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-size:14.5px; color:#8b8d93;\">{{ currentLog }}<\u002Fspan>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ analyzeDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:fadeUp .4s ease; margin-top:22px;\">\n          <div style=\"display:flex; gap:12px; justify-content:center; margin-bottom:20px;\">\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800;\">18 240<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">клиентов<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800;\">3<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">сегмента<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800; color:#16985a;\">3<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">возможности роста<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <button onclick=\"{{ goDashboard }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:15px 28px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\">Показать возможности роста<svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 4 · ВОЗМОЖНОСТИ ============ -->\n      <sc-if value=\"{{  color:#8b8d93; margin-bottom:8px;\">ВАРИАНТ A · тёплый<\u002Fdiv>\n                  <sc-if value=\"{{ notEditTexts }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#e7f8ef; border-radius:14px 14px 14px 4px; padding:13px 15px; font-size:13.5px; line-height:1.5; color:#1c4732;\">{{ campVarA }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ editTexts }}\" hint-placeholder-val=\"{{ false }}\">\n                  <textarea value=\"{{ draftA }}\" onchange=\"{{ onDraftA }}\" rows=\"4\" style=\"width:100%; box-sizing:border-box; font-family:inherit; font-size:13.5px; line-height:1.5; color:#1c4732; background:#e7f8ef; border:1px solid #2dc56e; border-radius:14px 14px 14px 4px; padding:13px 15px; outline:none; resize:vertical;\"><\u002Ftextarea>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:12.5px; font-weight:700; color:#8b8d93; margin-bottom:8px;\">ВАРИАНТ B · выгода<\u002Fdiv>\n                  <sc-if value=\"{{ notEditTexts }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"background:#eef4ff; border-radius:14px 14px 14px 4px; padding:13px 15px; font-size:13.5px; line-height:1.5; color:#1e3a6b;\">{{ campVarB }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ editTexts }}\" hint-placeholder-val=\"{{ false }}\">\n                  <textarea value=\"{{ draftB }}\" onchange=\"{{ onDraftB }}\" rows=\"4\" style=\"width:100%; box-sizing:border-box; font-family:inherit; font-size:13.5px; line-height:1.5; color:#1e3a6b; background:#eef4ff; border:1px solid #7ba3e8; border-radius:14px 14px 14px 4px; padding:13px 15px; outline:none; resize:vertical;\"><\u002Ftextarea>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13px; color:#8b8d93; margin-top:14px; line-height:1.5;\">Агент протестирует оба вари div>\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Каналы<\u002Fspan><b>{{ panelChannels }}<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Бюджет<\u002Fspan><b>{{ panelBudget }}<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; align-items:center; padding:18px 0;\">\n              <div><div style=\"font-size:13px; color:#8b8d93;\">Прогноз выручки<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:24px; font-weight:800; color:#16985a;\">{{ panelForecast }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:10px; padding:14px 0 18px; border-top:1px solid #f0f0f2;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13.5px;\"><span style=\"color:#46484f;\">Не чаще 1 сообщения / 3 дня<\u002Fspan><button onclick=\"{{ toggleFreq }}\" style=\"{{ tFreqStyle }}\"><span style=\"{{ tFreqKnob }}\"><\u002Fspan><\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13.5px;\"><span style=\"color:#46484f;\">Тон бренда<\u002Fspan><button onclick=\"{{ toggleTone }}\" style=\"{{ tToneStyle }}\"><span style=\"{{ tToneKnob }}\"><\u002Fspan><\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n\n            <button onclick=\"{{ launchCampaign }}\" style=\"width:100%; display:inline-flex; align-items:center; justify-content:center; gap:9px; background:#2dc56e; color:#fff; border:none; border-radius:13px; padding:15px; font-family:inherit; font-size:15.5px; font-weight:700; cursor:pointer;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.3\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Подтвердить и запустить<\u002Fbutton>\n            <div style=\"text-align:center; font-size:12.5px; color:#8b8d93; margin-top:12px;\">Запуск на реальную аудиторию требует вашего подтверждения. Остановить можно в любой момент.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 6 · РЕЗУЛЬТАТ ============ -->\n      <sc-if value=\"{{ showResults }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n\n        <!-- live phase -->\n        <sc-if value=\"{{ resultLive }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#16985a; background:#e7f8ef; padding:6px 13px; border-radius:9px; margin-bottom:14px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#2dc56e; animation:blink 1.4s ease-in-out infinite;\"><\u002Fspan>{{ liveStatus }}<\u002Fdiv>\n          <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">{{ campTitle }}<\u002Fh2>\n          <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Агент следит за откликом и корректирует кампанию на ходу. Итог с контрольной группой появится после завершения.<\u002Fp>\n\n          <div style=\"display:grid; grid-template-columns:1fr 360px; gap:22px; align-items:start;\">\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n                <div style=\"font-size:15px; font-weight:700;\">A/B-тест завершён<\u002Fdiv>\n                <span style=\"font-size:11.5px; font-weight:700; color:#16985a; background:#e7f8ef; border:1px solid #d6efe0; padding:3px 9px; border-radius:7px;\">{{ testWinner }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <span style=\"width:88px; flex:none; font-size:13px; font-weight:700; color:#16985a;\">Вариант A<\u002Fspan>\n                  <div style=\"flex:1; height:10px; background:#f0f0f2; border-radius:99px; overflow:hidden;\"><div style=\"{{ testBarA }}\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"width:110px; flex:none; text-align:right; font-size:13.5px; font-weight:800;\">{{ testPctA }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:12px;\">\n                  <span style=\"width:88px; flex:none; font-size:13px; font-weight:700; color:#8b8d93;\">Вариант B<\u002Fspan>\n                  <div style=\"flex:1; height:10px; background:#f0f0f2; border-radius:99px; overflow:hidden;\"><div style=\"{{ testBarB }}\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"width:110px; flex:none; text-align:right; font-size:13.5px; font-weight:800; color:#8b8d93;\">{{ testPctB }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13px; color:#8b8d93; margin-top:12px;\">{{ testNote }}<\u002Fdiv>\n\n              <div style=\"border-top:1px solid #f0f0f2; margin-top:18px; padding-top:18px;\">\n                <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\">\n                  <div style=\"font-size:15px; font-weight:700;\">Рассылка на базу · {{ panelChannels }}<\u002Fdiv>\n                  <div style=\"font-size:13.5px; color:#8b8d93;\">{{ liveSent }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:8px; background:#f0f0f2; border-radius:99px; overflow:hidden;\">\n                  <div style=\"{{ liveBarStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px; margin-top:18px;\">\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ testSummaryLine }}<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Контрольная группа {{ panelControl }} исключена из отправки — она не получает сообщений<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Стоп-листы и лимит частоты применяются автоматически<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ livePaused }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:9px; margin-top:18px; padding:12px 14px; background:#fff8f0; border:1px solid #ffe2c2; border-radius:12px; font-size:13.5px; color:#8a5a13; font-weight:600;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#f0a01e\" stroke-width=\"2\"><rect x=\"7\" y=\"5\" width=\"3.5\" height=\"14\" rx=\"1\"><\u002Frect><rect x=\"13.5\" y=\"5\" width=\"3.5\" height=\"14\" rx=\"1\"><\u002Frect><\u002Fsvg>Кампания на паузе — сообщения не отправляются.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px; background:#fff;\">\n              <div style=\"font-size:16px; font-weight:700; margin-bottom:16px;\">Управление<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <button onclick=\"{{ togglePause }}\" style=\"width:100%; background:#fff; color:#46484f; border:1px solid #dcdce0; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;\">{{ pauseLabel }}<\u002Fbutton>\n                <button onclick=\"{{ stopCampaign }}\" style=\"width:100%; background:#fff; color:#c73a3a; border:1px solid #f0caca; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;\">Остановить кампанию<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid #f0f0f2; margin-top:18px; padding-top:16px;\">\n                <div style=\"font-size:12.5px; color:#8b8d93; line-height:1.5; margin-bottom:12px;\">Для демонстрации можно промотать время и посмотреть итог кампании.<\u002Fdiv>\n                <button onclick=\"{{ finishDemo }}\" style=\"width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px; background:#141416; color:#fff; border:none; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:700; cursor:pointer;\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"m5 5 7 7-7 7M13 5l7 7-7 7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Промотать 21 день · демо<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- intermediate metrics -->\n          <h3 style=\"margin:28px 0 4px; font-size:19px; font-weight:800; letter-spacing:-.01em;\">Как идёт кампания<\u002Fh3>\n          <p style=\"margin:0 0 16px; font-size:14px; color:#8b8d93;\">Предварительные цифры без контрольной группы — итоговый эффект агент посчитает после завершения.<\u002Fp>\n          <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n            <sc-for list=\"{{ liveMetrics }}\" as=\"lm\" hint-placeholder-count=\"4\">\n            <div style=\"border:1px solid #ededf0; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px;\">\n                <div style=\"font-size:13px; color:#8b8d93;\">{{ lm.label }}<\u002Fdiv>\n                <span style=\"{{ lm.chipStyle }}\">{{ lm.chip }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:26px; font-weight:800; margin-top:8px;\">{{ lm.value }}<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">{{ lm.note }}<\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- agent verdict -->\n          <div style=\"display:flex; gap:16px; margin-top:16px; padding:20px 22px; border:1px dashed #cfead9; background:#f8fdfa; border-radius:18px;\">\n            <span style=\"width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#2dc56e,#15a85a); display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <div>\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:5px;\">\n                <div style=\"font-size:15.5px; font-weight:700;\">Вывод агента: продолжаем<\u002Fdiv>\n                <span style=\"font-size:11.5px; font-weight:700; color:#8a5a13; background:#fff8f0; border:1px solid #ffe2c2; padding:3px 9px; border-radius:7px;\">небольшое отклонение от плана<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:0; font-size:14.5px; line-height:1.6; color:#2c2e34;\">{{ liveVerdict }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- done phase -->\n        <sc-if value=\"{{ resultDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n        <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#16985a; background:#e7f8ef; padding:6px 13px; border-radius:9px; margin-bottom:14px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#2dc56e;\"><\u002Fspan>Кампания завершена · 21 день<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">{{ campTitle }}<\u002Fh2>\n        <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Эффект подтверждён контрольной группой — это прирост от кампании, а не сезона.<\u002Fp>\n\n        <!-- metric cards -->\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n          <sc-for list=\"{{ resMetrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">{{ m.label }}<\u002Fdiv><div style=\"{{ m.valStyle }}\">{{ m.value }}<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">{{ m.note }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- control vs test -->\n        <div style=\"display:grid; grid-template-columns:300px 1fr; gap:22px; margin-top:20px;\">\n          <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n            <div style=\"font-size:15px; font-weight:700; margin-bottom:18px;\">Тест против контроля<\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-end; gap:28px; height:150px; padding:0 8px;\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n       return { draftSteps: d };\n    });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const cur = this.order.indexOf(s.screen);\n    const done = s.analyzeStep >= this.allLogs.length;\n\n    const last = this.order.length - 1;\n    const stepper = this.order.map((name, i) => {\n      const reachable = i <= s.visited;\n      const isCur = i === cur;\n      const isDone = i < cur;\n      let cBg, cCol, cBorder;\n      if (isCur || isDone) { cBg = '#141416'; cCol = '#fff'; cBorder = 'none'; }\n      else { cBg = '#fff'; cCol = '#b0b2b8'; cBorder = '2px solid #dadbe0'; }\n      const lblCol = (isCur || isDone) ? '#16181d' : '#a8aab0';\n      const lblW = (isCur || isDone) ? '700' : '500';\n      const lineDark = i <= cur;\n      return {\n        label: this.labels[i],\n        mark: isDone ? '✓' : String(i + 1),\n        onClick: reachable ? () => this.go(name) : () => {},\n        btnStyle: `display:inline-flex;align-items:center;gap:10px;flex:none;background:none;border:none;padding:0;font-family:inherit;font-size:15px;cursor:${reachable ? 'pointer' : 'default'};`,\n        circleStyle: `width:26px;height:26px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;line-height:1;background:${cBg};color:${cCol};border:${cBorder};box-sizing:border-box;`,\n        labelStyle: `color:${lblCol};font-weight:${lblW};white-space:nowrap;`,\n        lineStyle: i === last ? 'display:none;' : `height:2px;flex:1;min-width:18px;margin:0 16px;border-radius:2px;background:${lineDark ? '#141416' : '#e2e2e6'};`,\n      };\n    });\n\n    return {\n      ...this.marketingVals(),\n      showWelcome: s.screen === 'welcome',\n      showImport: s.screen === 'import',\n      showAnalyzing: s.screen === 'analyzing',\n      showDashboard: s.screen === 'dashboard',\n      showCampaign: s.screen === 'campaign',\n      showResults: s.screen === 'results',\n\n      ...(() => {\n        const selCard = 'position:relative;border:1.5px solid #2dc56e;background:#f3fbf6;border-radius:18px;padding:22px;cursor:pointer;';\n        const offCard = 'position:relative;border:1.5px solid #ededf0;background:#fff;border-radius:18px;padding:22px;cursor:pointer;';\n        const selIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#2dc56e;color:#fff;';\n        const offIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#f1f1f3;color:#46484f;';\n        const mk = (key) => { const sel = s.goal === key; return { card: sel ? selCard : offCard, icon: sel ? selIcon : offIcon, sel }; };\n        const r = mk('repeat'), a = mk('reactivate'), c = mk('churn'), o = mk('aov');\n        return {\n          cRepeatCard: r.card, cRepeatIcon: r.icon, cRepeatSel: r.sel, cRepeatBadge: r.sel,\n          cReactCard: a.card, cReactIcon: a.icon, cReactSel: a.sel,\n          cChurnCard: c.card, cChurnIcon: c.icon, cChurnSel: c.sel,\n          cAovCard: o.card, cAovIcon: o.icon, cAovSel: o.sel,\n        };\n      })(),\n      pickRepeat: () => this.setState({ goal: 'repeat' }),\n      pickReactivate: () => this.setState({ goal: 'reactivate' }),\n      pickChurn: () => this.setState({ goal: 'churn' }),\n      pickAov: () => this.setState({ goal: 'aov' }),\n\n      goWelcome: () => this.go('welcome'),\n      goImport: () => this.go('import'),\n      goAnalyzing: () => this.go('analyzing'),\n      goDashboard: () => this.go('dashboard'),\n      goCampaign: () => this.go('campaign'),\n      launchCampaign: () => { this.setState({ resultPhase: 'live', paused: false }); this.go('results'); },\n      goHome: () => { this.setState({ module: 'aktiv' }); this.go(s.visited >= 3 ? 'dashboard' : 'welcome'); },\n\n      goalSummary: this.goals[s.goal].summary,\n      goalTitle: this.goals[s.goal].title,\n\n      resultLive: s.resultPhase === 'live',\n      resultDone: s.resultPhase === 'done',\n      liv ght:20px;border-radius:99px;border:none;padding:0;cursor:pointer;position:relative;flex:none;background:${on ? '#2dc56e' : '#d4d4d8'};`;\n        const knob = (on) => `position:absolute;top:2px;${on ? 'right:2px;' : 'left:2px;'}width:16px;height:16px;border-radius:50%;background:#fff;`;\n        return {\n          campTitle: o.title,\n          campHypothesis: o.hypothesis,\n          campBasis: o.basis.map(text => ({ text })),\n          campSteps: effSteps.map((st, i2) => ({\n            day: st.day, title: st.title, sub: st.sub,\n            dayStyle: `width:34px;height:34px;border-radius:10px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;${i2 === 0 ? 'background:#e7f8ef;color:#16985a;' : 'background:#f1f1f3;color:#46484f;'}`,\n            lineStyle: i2 === effSteps.length - 1 ? 'display:none;' : 'width:2px;flex:1;background:#ededf0;margin:4px 0;',\n            bodyStyle: i2 === effSteps.length - 1 ? '' : 'padding-bottom:18px;',\n          })),\n          campVarA: effVarA, campVarB: effVarB,\n\n          editScen: s.editScen, notEditScen: !s.editScen,\n          editScenStart: () => this.setState({ editScen: true, draftSteps: effSteps.map(x => ({ ...x })) }),\n          editScenCancel: () => this.setState({ editScen: false }),\n          editScenSave: () => this.setState(st => ({ editScen: false, overrides: { ...st.overrides, [st.sel]: { ...(st.overrides[st.sel] || {}), steps: st.draftSteps } } })),\n          editSteps: (s.draftSteps || []).map((es, i3) => ({\n            day: es.day, title: es.title, sub: es.sub,\n            dayStyle: `width:34px;height:34px;border-radius:10px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;margin-top:3px;${i3 === 0 ? 'background:#e7f8ef;color:#16985a;' : 'background:#f1f1f3;color:#46484f;'}`,\n            onTitle: (e) => this.updDraftStep(i3, 'title', e.target.value),\n            onSub: (e) => this.updDraftStep(i3, 'sub', e.target.value),\n          })),\n\n          editTexts: s.editTexts, notEditTexts: !s.editTexts,\n          editTextsStart: () => this.setState({ editTexts: true, draftA: effVarA, draftB: effVarB }),\n          editTextsCancel: () => this.setState({ editTexts: false }),\n          editTextsSave: () => this.setState(st => ({ editTexts: false, overrides: { ...st.overrides, [st.sel]: { ...(st.overrides[st.sel] || {}), varA: st.draftA, varB: st.draftB } } })),\n          draftA: s.draftA, draftB: s.draftB,\n          onDraftA: (e) => this.setState({ draftA: e.target.value }),\n          onDraftB: (e) => this.setState({ draftB: e.target.value }),\n          whySegment: o.whySegment, whyMessage: o.whyMessage, whyChannel: o.whyChannel,\n          panelAud: o.panel.aud, panelControl: o.panel.control, panelChannels: o.panel.channels, panelBudget: o.panel.budget, panelForecast: o.panel.forecast,\n          toggleFreq: () => this.setState(st => ({ tFreq: !st.tFreq })),\n          toggleTone: () => this.setState(st => ({ tTone: !st.tTone })),\n          tFreqStyle: tog(s.tFreq), tFreqKnob: knob(s.tFreq),\n          tToneStyle: tog(s.tTone), tToneKnob: knob(s.tTone),\n          resMetrics: r.metrics.map(m => ({ label: m.label, value: m.value, note: m.note, valStyle: `font-size:30px;font-weight:800;margin-top:6px;${m.green ? 'color:#16985a;' : ''}` })),\n          barTestPct: r.testPct, barCtrlPct: r.ctrlPct, barPP: r.pp, barMetricName: r.metricName,\n          barTestStyle: `width:100%;height:${r.testH}px;background:#2dc56e;border-radius:10px 10px 0 0;transform-origin:bottom;animation:growBar .7s ease both;`,\n          barCtrlStyle: `width:100%;height:${r.ctrlH}px;background:#dfe0e3;border-radius:10px 10px 0 0;transform-origin:bottom;animation:growBar .7s ease both;`,\n          resInsight: r.insight,\n          resFacts: r.facts.map(text => ({ text })),\n          nextTitle: next.title, nextClients: next.clients, nextForecast: next.forecast,\n          goNextOpp: () => { this.setState({ sel: (s.sel + 1) % this.opps.length }); this.go('dashboard'); },\n        };\n      })(),\n\n      stepper,\n      logLines: this.allLogs.slice(0, s.analyzeStep).map(t => ({ text: t })),\n      currentLog: this.allLogs[Math.min(s.analyzeStep, this.allLogs.length - 1)],\n      analyzing: !done,\n      analyzeDone: done,\n      progressStyle: `height:100%;background:linear-gradient(90deg,#2dc56e,#15a85a);border-radius:99px;width:${Math.round((s.analyzeStep / this.allLogs.length) * 100)}%;transition:width .5s ease;`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

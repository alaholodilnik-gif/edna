  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"margin:16px 0 6px; font-size:18px; font-weight:700;\">Поднять средний чек<\u002Fh3>\n            <p style=\"margin:0; font-size:14px; color:#5c5f67; line-height:1.5;\">Продавать больше тем, кто уже покупает.<\u002Fp>\n            <sc-if value=\"{{ cAovSel }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:14px; font-size:13px; font-weight:700; color:#16985a;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Выбрано<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; gap:18px; margin-top:26px; padding:18px 22px; max-width:760px; background:#fafafa; border:1px solid #ededf0; border-radius:16px;\">\n          <div style=\"flex:1; font-size:15px; color:#46484f;\">Цель: <b>{{ goalSummary }}<\u002Fb> за квартал.<\u002Fdiv>\n          <button onclick=\"{{ goImport }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:14px 24px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\">Продолжить<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 2 · ДАННЫЕ ============ -->\n      <sc-if value=\"{{ showImport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n        <div style=\"max-width:680px;\">\n          <h2 style=\"margin:0 0 12px; font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.15;\">Подключите данные о заказах<\u002Fh2>\n          <p style=\"margin:0 0 28px; font-size:16px; line-height:1.55; color:#5c5f67;\">Достаточно обычной выгрузки заказов из Excel. Агент работает даже с неполными данными — недостающие поля не помешают старту.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1.3fr 1fr; gap:18px; max-width:880px;\">\n          <!-- uploaded file (done) -->\n          <div style=\"border:1.5px solid #2dc56e; background:#f3fbf6; border-radius:18px; padding:24px;\">\n            <div style=\"display:flex; align-items:center; gap:14px;\">\n              <div style=\"width:46px; height:46px; border-radius:12px; background:#fff; border:1px solid #d6efe0; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"1.8\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M14 3v5h5M9 14l2 2 4-4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"font-size:15.5px; font-weight:700;\">Заказы_2026.xlsx<\u002Fdiv>\n                <div style=\"font-size:13px; color:#16985a; font-weight:600;\">Загружено · 18 240 клиентов · 47 310 заказов<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"width:26px; height:26px; border-radius:50%; background:#2dc56e; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:20px; border-top:1px dashed #cfead9; padding-top:18px;\">\n              <div style=\"font-size:13px; font-weight:700; color:#16985a; text-transform:uppercase; letter-spacing:.04em; margin-bottom:12px;\">Агент распознал поля<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:9px;\">\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Телефон / email <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">ключ клиента<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Дата заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">14 месяцев истории<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Сумма заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">средний чек 4 280 ₽<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Состав заказа <span style=\"margin-left:auto; color:#8b8d93; font-size:13px;\">для рекомендаций<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14.5px; color:#8b8d93;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c5c6cb\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Город — не найден <span style=\"margin-left:auto; font-size:13px;\">необязательно<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- connectors + consents -->\n          <div style=\"display:flex; flex-direction:column; gap:18px;\">\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:22px;\">\n              <div style=\"font-size:15px; font-weight:700; margin-bottom:4px;\">Или подключите источник<\u002Fdiv>\n              <p style=\"margin:0 0 14px; font-size:13.5px; color:#8b8d93; line-height:1.5;\">Без программиста — обновление данных по расписанию.<\u002Fp>\n              <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n                <sc-for list=\"{{ connectors }}\" as=\"cn\" hint-placeholder-count=\"5\">\n                  <button onclick=\"{{ cn.onClick }}\" style=\"{{ cn.style }}\">{{ cn.name }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <sc-if value=\"{{ connectorPicked }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:8px; margin-top:14px; padding:11px 13px; background:#f3fbf6; border:1px solid #d6efe0; border-radius:11px; font-size:13px; color:#16985a; font-weight:600;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ connectorNote }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:22px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"1.8\"><path d=\"M12 3 5 6v5c0 4 3 7 7 8 4-1 7-4 7-8V6l-7-3Z\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"m9 12 2 2 4-4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Согласия проверены<\u002Fdiv>\n              <p style=\"margin:10px 0 0; font-size:14px; color:#5c5f67; line-height:1.55;\"><b style=\"color:#16181d;\">16 980 из 18 240<\u002Fb> клиентов можно писать. Остальные и стоп-листы агент исключит автоматически.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; align-items:center; gap:14px; margin-top:24px;\">\n          <button onclick=\"{{ goWelcome }}\" style=\"background:#fff; color:#46484f; border:1px solid #dcdce0; border-radius:12px; padding:14px 20px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;\">Назад<\u002Fbutton>\n          <button onclick=\"{{ goAnalyzing }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:14px 24px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg>Анализировать данные<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 3 · АНАЛИЗ ============ -->\n      <sc-if value=\"{{ showAnalyzing }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease; max-width:720px; margin:0 auto; padding-top:8px;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; text-align:center;\">\n          <div style=\"width:74px; height:74px; border-radius:21px; background:linear-gradient(135deg,#2dc56e,#13a356); display:flex; align-items:center; justify-content:center; animation:pulseGlow 1.8s ease-in-out infinite;\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h2 style=\"margin:22px 0 8px; font-size:26px; font-weight:800; letter-spacing:-.02em;\">Пульс изучает вашу базу<\u002Fh2>\n          <p style=\"margin:0; font-size:15.5px; color:#5c5f67;\">Объединяет заказы, считает поведение и ищет точки роста под вашу цель.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"height:6px; background:#eee; border-radius:99px; margin:28px 0 22px; overflow:hidden;\">\n          <div style=\"{{ progressStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #ededf0; border-radius:18px; padding:10px 8px;\">\n          <sc-for list=\"{{ logLines }}\" as=\"ln\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex; align-items:center; gap:13px; padding:13px 16px; animation:fadeUp .4s ease both;\">\n              <span style=\"width:26px; height:26px; border-radius:8px; background:#e7f8ef; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"2.6\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-size:14.5px; color:#2c2e34;\">{{ ln.text }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ analyzing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:13px; padding:13px 16px;\">\n            <span style=\"width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex:none;\"><span style=\"width:16px; height:16px; border:2.4px solid #d9efe2; border-top-color:#2dc56e; border-radius:50%; animation:spin .7s linear infinite;\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-size:14.5px; color:#8b8d93;\">{{ currentLog }}<\u002Fspan>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ analyzeDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:fadeUp .4s ease; margin-top:22px;\">\n          <div style=\"display:flex; gap:12px; justify-content:center; margin-bottom:20px;\">\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800;\">18 240<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">клиентов<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800;\">3<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">сегмента<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:center; padding:14px 22px; border:1px solid #ededf0; border-radius:14px; min-width:120px;\"><div style=\"font-size:24px; font-weight:800; color:#16985a;\">3<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93;\">возможности роста<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <button onclick=\"{{ goDashboard }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#141416; color:#fff; border:none; border-radius:12px; padding:15px 28px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;\">Показать возможности роста<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 4 · ВОЗМОЖНОСТИ ============ -->\n      <sc-if value=\"{{ showDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n        <!-- goal status -->\n        <div style=\"display:flex; align-items:center; gap:20px; background:linear-gradient(120deg,#16181d,#26282f); border-radius:20px; padding:24px 28px; color:#fff;\">\n          <div style=\"flex:1;\">\n            <div style=\"font-size:13px; font-weight:600; color:#9ea0a8; text-transform:uppercase; letter-spacing:.05em;\">Ваша цель<\u002Fdiv>\n            <div style=\"font-size:22px; font-weight:800; margin-top:4px;\">{{ goalTitle }}<\u002Fdiv>\n            <div style=\"font-size:14px; color:#b9bbc2; margin-top:6px;\">Агент собрал план. Запустите кампании — прогресс появится здесь.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;\">\n            <div style=\"font-size:13px; color:#9ea0a8;\">Потенциал по 3 механикам<\u002Fdiv>\n            <div style=\"font-size:30px; font-weight:800; color:#3ddc81;\">+3,96 млн ₽<\u002Fdiv>\n            <div style=\"font-size:13px; color:#9ea0a8;\">прогноз инкрементальной выручки<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- key insight -->\n        <div style=\"display:flex; gap:16px; margin-top:20px; padding:20px 22px; border:1px solid #ffe2c2; background:#fff8f0; border-radius:18px;\">\n          <div style=\"width:40px; height:40px; border-radius:12px; background:#f0a01e; display:flex; align-items:center; justify-content:center; flex:none;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><path d=\"M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.6 1 1 1 2.5h6c0-1.5.3-1.9 1-2.5A6 6 0 0 0 12 3Z\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div>\n            <div style=\"font-size:16px; font-weight:700; margin-bottom:4px;\">Главная находка агента<\u002Fdiv>\n            <p style=\"margin:0; font-size:14.5px; line-height:1.55; color:#46484f;\"><b>41% клиентов не делают третий заказ.<\u002Fb> Отток концентрируется на 45–60-й день после второго заказа — это самая большая и при этом обратимая потеря выручки в вашей базе.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"margin:30px 0 4px; font-size:21px; font-weight:800; letter-spacing:-.01em;\">Агент нашёл 3 возможности роста<\u002Fh3>\n        <p style=\"margin:0 0 18px; font-size:14.5px; color:#8b8d93;\">Отсортированы по ожидаемому эффекту и уверенности. Начните с верхней.<\u002Fp>\n\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <sc-for list=\"{{ oppCards }}\" as=\"op\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ op.onClick }}\" style=\"{{ op.cardStyle }}\">\n              <div style=\"flex:1; min-width:0;\">\n                <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:7px;\">\n                  <sc-if value=\"{{ op.best }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-size:11px; font-weight:800; letter-spacing:.03em; color:#16985a; background:#e7f8ef; padding:4px 9px; border-radius:7px;\">ЛУЧШИЙ СТАРТ<\u002Fspan>\n                  <\u002Fsc-if>\n                  <span style=\"{{ op.confStyle }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M12 3v18M5 10l7-7 7 7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ op.conf }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:18px; font-weight:700;\">{{ op.title }}<\u002Fdiv>\n                <p style=\"margin:6px 0 0; font-size:14px; color:#5c5f67; line-height:1.5;\">{{ op.desc }}<\u002Fp>\n                <div style=\"display:flex; gap:22px; margin-top:14px;\">\n                  <div><div style=\"font-size:18px; font-weight:800;\">{{ op.clients }}<\u002Fdiv><div style=\"font-size:12px; color:#8b8d93;\">клиентов в сегменте<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"{{ op.forecastStyle }}\">{{ op.forecast }}<\u002Fdiv><div style=\"font-size:12px; color:#8b8d93;\">прогноз выручки<\u002Fdiv><\u002Fdiv>\n                  <div><div style=\"font-size:18px; font-weight:800;\">{{ op.channels }}<\u002Fdiv><div style=\"font-size:12px; color:#8b8d93;\">каналы<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ op.btnClick }}\" style=\"{{ op.btnStyle }}\">Открыть план<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 5 · КАМПАНИЯ ============ -->\n      <sc-if value=\"{{ showCampaign }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n        <button onclick=\"{{ goDashboard }}\" style=\"display:inline-flex; align-items:center; gap:7px; background:none; border:none; color:#8b8d93; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; padding:0; margin-bottom:16px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\"><path d=\"M15 6l-6 6 6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Все возможности<\u002Fbutton>\n        <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">{{ campTitle }}<\u002Fh2>\n        <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Агент собрал готовую кампанию. Проверьте и запустите — менять ничего не нужно.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:1fr 360px; gap:22px; align-items:start;\">\n          <!-- left column -->\n          <div style=\"display:flex; flex-direction:column; gap:18px;\">\n\n            <!-- hypothesis -->\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n              <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:12px;\"><span style=\"width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,#2dc56e,#15a85a); display:flex; align-items:center; justify-content:center;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:16px; font-weight:700;\">Гипотеза агента<\u002Fspan><\u002Fdiv>\n              <p style=\"margin:0 0 16px; font-size:15.5px; line-height:1.6; color:#2c2e34;\">{{ campHypothesis }}<\u002Fp>\n              <div style=\"font-size:12.5px; font-weight:700; color:#8b8d93; text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px;\">На чём основано<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:9px;\">\n                <sc-for list=\"{{ campBasis }}\" as=\"b\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; gap:10px; font-size:14px; color:#46484f;\"><span style=\"color:#2dc56e; font-weight:800;\">·<\u002Fspan>{{ b.text }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- scenario -->\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n              <div style=\"font-size:16px; font-weight:700; margin-bottom:18px;\">Сценарий, который собрал агент<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:0;\">\n                <sc-for list=\"{{ campSteps }}\" as=\"cs\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; gap:16px;\">\n                  <div style=\"display:flex; flex-direction:column; align-items:center;\"><span style=\"{{ cs.dayStyle }}\">{{ cs.day }}<\u002Fspan><span style=\"{{ cs.lineStyle }}\"><\u002Fspan><\u002Fdiv>\n                  <div style=\"{{ cs.bodyStyle }}\"><div style=\"font-size:14.5px; font-weight:700;\">{{ cs.title }}<\u002Fdiv><div style=\"font-size:13.5px; color:#8b8d93; margin-top:2px;\">{{ cs.sub }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:9px; margin-top:18px; padding:12px 14px; background:#f7f7f8; border-radius:12px; font-size:13.5px; color:#5c5f67;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8b8d93\" stroke-width=\"1.9\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4l2.5 1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><b style=\"color:#16181d;\">Контрольная группа 10%<\u002Fb> не получает сообщений — чтобы честно измерить эффект.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- content A/B -->\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;\"><div style=\"font-size:16px; font-weight:700;\">Агент написал два варианта<\u002Fdiv><span style=\"font-size:12px; font-weight:700; color:#16985a; background:#e7f8ef; padding:4px 10px; border-radius:8px;\">A/B-тест<\u002Fspan><\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n                <div>\n                  <div style=\"font-size:12.5px; font-weight:700; color:#8b8d93; margin-bottom:8px;\">ВАРИАНТ A · тёплый<\u002Fdiv>\n                  <div style=\"background:#e7f8ef; border-radius:14px 14px 14px 4px; padding:13px 15px; font-size:13.5px; line-height:1.5; color:#1c4732;\">{{ campVarA }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <div style=\"font-size:12.5px; font-weight:700; color:#8b8d93; margin-bottom:8px;\">ВАРИАНТ B · выгода<\u002Fdiv>\n                  <div style=\"background:#eef4ff; border-radius:14px 14px 14px 4px; padding:13px 15px; font-size:13.5px; line-height:1.5; color:#1e3a6b;\">{{ campVarB }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:13px; color:#8b8d93; margin-top:14px; line-height:1.5;\">Агент протестирует оба на 5% аудитории и автоматически переведёт остальных на победителя.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- transparency -->\n            <div style=\"border:1px dashed #cfead9; background:#f8fdfa; border-radius:18px; padding:22px 24px;\">\n              <div style=\"display:flex; align-items:center; gap:9px; font-size:15px; font-weight:700; margin-bottom:12px; color:#16985a;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#16985a\" stroke-width=\"1.9\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 11v5M12 7.5h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Почему агент так решил<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:11px;\">\n                <div style=\"font-size:14px; line-height:1.55; color:#2c2e34;\"><b>Сегмент:<\u002Fb> {{ whySegment }}<\u002Fdiv>\n                <div style=\"font-size:14px; line-height:1.55; color:#2c2e34;\"><b>Сообщение:<\u002Fb> {{ whyMessage }}<\u002Fdiv>\n                <div style=\"font-size:14px; line-height:1.55; color:#2c2e34;\"><b>Канал:<\u002Fb> {{ whyChannel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- right sticky -->\n          <div style=\"position:sticky; top:170px; border:1px solid #ededf0; border-radius:18px; padding:24px; background:#fff;\">\n            <div style=\"font-size:16px; font-weight:700; margin-bottom:16px;\">Перед запуском<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:13px; padding-bottom:18px; border-bottom:1px solid #f0f0f2;\">\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Аудитория<\u002Fspan><b>{{ panelAud }}<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Контрольная группа<\u002Fspan><b>{{ panelControl }}<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Каналы<\u002Fspan><b>{{ panelChannels }}<\u002Fb><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-size:14px;\"><span style=\"color:#8b8d93;\">Бюджет<\u002Fspan><b>{{ panelBudget }}<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; justify-content:space-between; align-items:center; padding:18px 0;\">\n              <div><div style=\"font-size:13px; color:#8b8d93;\">Прогноз выручки<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:24px; font-weight:800; color:#16985a;\">{{ panelForecast }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; flex-direction:column; gap:10px; padding:14px 0 18px; border-top:1px solid #f0f0f2;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13.5px;\"><span style=\"color:#46484f;\">Не чаще 1 сообщения / 3 дня<\u002Fspan><button onclick=\"{{ toggleFreq }}\" style=\"{{ tFreqStyle }}\"><span style=\"{{ tFreqKnob }}\"><\u002Fspan><\u002Fbutton><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; justify-content:space-between; font-size:13.5px;\"><span style=\"color:#46484f;\">Тон бренда<\u002Fspan><button onclick=\"{{ toggleTone }}\" style=\"{{ tToneStyle }}\"><span style=\"{{ tToneKnob }}\"><\u002Fspan><\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n\n            <button onclick=\"{{ launchCampaign }}\" style=\"width:100%; display:inline-flex; align-items:center; justify-content:center; gap:9px; background:#2dc56e; color:#fff; border:none; border-radius:13px; padding:15px; font-family:inherit; font-size:15.5px; font-weight:700; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.3\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Подтвердить и запустить<\u002Fbutton>\n            <div style=\"text-align:center; font-size:12.5px; color:#8b8d93; margin-top:12px;\">Запуск на реальную аудиторию требует вашего подтверждения. Остановить можно в любой момент.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ SCREEN 6 · РЕЗУЛЬТАТ ============ -->\n      <sc-if value=\"{{ showResults }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:fadeUp .4s ease;\">\n\n        <!-- live phase -->\n        <sc-if value=\"{{ resultLive }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#16985a; background:#e7f8ef; padding:6px 13px; border-radius:9px; margin-bottom:14px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#2dc56e; animation:blink 1.4s ease-in-out infinite;\"><\u002Fspan>{{ liveStatus }}<\u002Fdiv>\n          <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">{{ campTitle }}<\u002Fh2>\n          <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Агент отправляет первую волну и следит за откликом. Итог с контрольной группой появится после завершения — примерно через 21 день.<\u002Fp>\n\n          <div style=\"display:grid; grid-template-columns:1fr 360px; gap:22px; align-items:start;\">\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;\">\n                <div style=\"font-size:15px; font-weight:700;\">Волна 1 · {{ panelChannels }}<\u002Fdiv>\n                <div style=\"font-size:13.5px; color:#8b8d93;\">{{ liveSent }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height:8px; background:#f0f0f2; border-radius:99px; overflow:hidden;\">\n                <div style=\"{{ liveBarStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px; margin-top:20px;\">\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>A/B-тест идёт на 5% аудитории — победитель определится к 4-му дню<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Контрольная группа {{ panelControl }} исключена из отправки<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Стоп-листы и лимит частоты применяются автоматически<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ livePaused }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; align-items:center; gap:9px; margin-top:18px; padding:12px 14px; background:#fff8f0; border:1px solid #ffe2c2; border-radius:12px; font-size:13.5px; color:#8a5a13; font-weight:600;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f0a01e\" stroke-width=\"2\"><rect x=\"7\" y=\"5\" width=\"3.5\" height=\"14\" rx=\"1\"><\u002Frect><rect x=\"13.5\" y=\"5\" width=\"3.5\" height=\"14\" rx=\"1\"><\u002Frect><\u002Fsvg>Кампания на паузе — сообщения не отправляются.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px; background:#fff;\">\n              <div style=\"font-size:16px; font-weight:700; margin-bottom:16px;\">Управление<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:10px;\">\n                <button onclick=\"{{ togglePause }}\" style=\"width:100%; background:#fff; color:#46484f; border:1px solid #dcdce0; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;\">{{ pauseLabel }}<\u002Fbutton>\n                <button onclick=\"{{ stopCampaign }}\" style=\"width:100%; background:#fff; color:#c73a3a; border:1px solid #f0caca; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer;\">Остановить кампанию<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"border-top:1px solid #f0f0f2; margin-top:18px; padding-top:16px;\">\n                <div style=\"font-size:12.5px; color:#8b8d93; line-height:1.5; margin-bottom:12px;\">Для демонстрации можно промотать время и посмотреть итог кампании.<\u002Fdiv>\n                <button onclick=\"{{ finishDemo }}\" style=\"width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px; background:#141416; color:#fff; border:none; border-radius:12px; padding:13px; font-family:inherit; font-size:14.5px; font-weight:700; cursor:pointer;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"m5 5 7 7-7 7M13 5l7 7-7 7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Промотать 21 день · демо<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- done phase -->\n        <sc-if value=\"{{ resultDone }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n        <div style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#16985a; background:#e7f8ef; padding:6px 13px; border-radius:9px; margin-bottom:14px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#2dc56e;\"><\u002Fspan>Кампания завершена · 21 день<\u002Fdiv>\n        <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">{{ campTitle }}<\u002Fh2>\n        <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Эффект подтверждён контрольной группой — это прирост от кампании, а не сезона.<\u002Fp>\n\n        <!-- metric cards -->\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n          <sc-for list=\"{{ resMetrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">{{ m.label }}<\u002Fdiv><div style=\"{{ m.valStyle }}\">{{ m.value }}<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">{{ m.note }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- control vs test -->\n        <div style=\"display:grid; grid-template-columns:300px 1fr; gap:22px; margin-top:20px;\">\n          <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n            <div style=\"font-size:15px; font-weight:700; margin-bottom:18px;\">Тест против контроля<\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-end; gap:28px; height:150px; padding:0 8px;\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n                <div style=\"font-size:16px; font-weight:800; color:#16985a;\">{{ barTestPct }}<\u002Fdiv>\n                <div style=\"{{ barTestStyle }}\"><\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#8b8d93;\">Тест<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n                <div style=\"font-size:16px; font-weight:800; color:#8b8d93;\">{{ barCtrlPct }}<\u002Fdiv>\n                <div style=\"{{ barCtrlStyle }}\"><\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#8b8d93;\">Контроль<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center; margin-top:16px; padding-top:14px; border-top:1px solid #f0f0f2; font-size:14px;\">Прирост <b style=\"color:#16985a;\">{{ barPP }}<\u002Fb> {{ barMetricName }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n            <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:14px;\"><span style=\"width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,#2dc56e,#15a85a); display:flex; align-items:center; justify-content:center;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:16px; font-weight:700;\">Что понял агент<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 14px; font-size:15px; line-height:1.6; color:#2c2e34;\">{{ resInsight }}<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <sc-for list=\"{{ resFacts }}\" as=\"f\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>{{ f.text }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- next best action -->\n        <div style=\"display:flex; align-items:center; gap:20px; margin-top:20px; background:linear-gradient(120deg,#16181d,#26282f); border-radius:20px; padding:24px 28px; color:#fff;\">\n          <div style=\"flex:1;\">\n            <div style=\"font-size:13px; font-weight:600; color:#9ea0a8; text-transform:uppercase; letter-spacing:.05em;\">Следующий шаг от агента<\u002Fdiv>\n            <div style=\"font-size:20px; font-weight:800; margin-top:5px;\">{{ nextTitle }}<\u002Fdiv>\n            <div style=\"font-size:14px; color:#b9bbc2; margin-top:5px;\">{{ nextClients }} клиентов · прогноз <b style=\"color:#3ddc81;\">{{ nextForecast }}<\u002Fb>. Агент уже подготовил план.<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ goNextOpp }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#2dc56e; color:#fff; border:none; border-radius:12px; padding:14px 22px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; flex:none;\">К возможностям<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen: 'welcome', visited: 0, goal: 'repeat', analyzeStep: 0, sel: 0, connector: null, tFreq: true, tTone: true, resultPhase: 'live', paused: false };\n\n  goals = {\n    repeat: { summary: 'повысить повторные покупки на 15%', title: 'Повторные покупки +15% за квартал' },\n    reactivate: { summary: 'вернуть 10% спящих клиентов', title: 'Вернуть 10% спящих клиентов за квартал' },\n    churn: { summary: 'снизить отток на 20%', title: 'Снизить отток на 20% за квартал' },\n    aov: { summary: 'поднять средний чек на 10%', title: 'Средний чек +10% за квартал' },\n  };\n\n  liveSentArr = ['1 060 из 2 808 сообщений', '640 из 1 683 сообщений', '820 из 2 160 сообщений'];\n\n  connectorNames = ['amoCRM', 'Битрикс24', '1С', 'InSales', 'retailCRM'];\n\n  opps = [\n    {\n      title: 'Вернуть клиентов после второго заказа', best: true, conf: 'уверенность высокая', confHigh: true,\n      desc: 'Поймать сегмент до того, как он уйдёт. Каскад WhatsApp → SMS с персональной подборкой.',\n      clients: '3 120', forecast: '+1,84 млн ₽', channels: 'WA · SMS',\n      hypothesis: 'Клиенты со вторым заказом и паузой 30–60 дней — на грани оттока, но ещё активны. Персональное напоминание со ссылкой на их прошлый заказ вернёт значимую часть к третьей покупке.',\n      basis: ['41% клиентов не доходят до третьего заказа', 'Медианный разрыв между 2-м и 3-м заказом — 38 дней, отток растёт после 45-го', 'У сегмента средний чек на 18% выше разовых покупателей — возвращать выгодно'],\n      steps: [\n        { day: '0д', title: 'WhatsApp · персональное напоминание', sub: 'Подборка к прошлому заказу клиента' },\n        { day: '3д', title: 'Нет ответа → SMS', sub: 'Мягкий стимул: персональная скидка 7%' },\n        { day: '7д', title: 'Открыл, не купил → WhatsApp', sub: 'Ограниченное по времени предложение' },\n      ],\n      varA: 'Анна, давно вас не видели! Собрали то, что хорошо подойдёт к вашему прошлому заказу — загляните за пару минут.',\n      varB: 'Анна, ваша персональная скидка 7% действует 48 часов. Выберите из подборки специально под вас.',\n      whySegment: 'клиенты ровно с 2 заказами и паузой 30–60 дней — здесь отток максимальный и ещё обратим.',\n      whyMessage: 'ссылается на прошлый заказ — персонализация по истории даёт +34% к отклику на похожих кампаниях.',\n      whyChannel: 'WhatsApp первым — у него самый высокий open rate в вашей базе; SMS как подстраховка.',\n      panel: { aud: '3 120 клиентов', control: '10% · 312', channels: 'WhatsApp → SMS', budget: '≈ 96 000 ₽', forecast: '+1,84 млн ₽' },\n      results: {\n        metrics: [\n          { label: 'Повторные покупки', value: '+12,4%', note: 'вклад в цель квартала', green: true },\n          { label: 'Инкрементальная выручка', value: '1,84 млн ₽', note: 'сверх контрольной группы' },\n          { label: 'Окупаемость', value: '19×', note: 'на ₽1 затрат — ₽19' },\n          { label: 'Доп. заказов', value: '430', note: 'от вернувшихся клиентов' },\n        ],\n        testPct: '14,8%', ctrlPct: '9,2%', testH: 118, ctrlH: 73, pp: '+5,6 п.п.', metricName: 'к повторным покупкам',\n        insight: 'Сработала персонализация по прошлому заказу: вариант A дал отклик на 22% выше варианта B, поэтому на 4-й день агент перевёл на него 95% аудитории. Контрольная группа подтверждает: рост — заслуга кампании.',\n        facts: ['WhatsApp принёс 78% возвратов, SMS — остальные 22%', 'Лучшее окно отправки — вторник, 11:00'],\n      },\n    },\n    {\n      title: 'Удержать уходящих', best: false, conf: 'уверенность средняя', confHigh: false,\n      desc: 'У сегмента падает частота покупок. Мягкий winback с напоминанием о ценности.',\n      clients: '1 870', forecast: '+1,2 млн ₽', channels: 'WhatsApp',\n      hypothesis: 'Клиенты с 3+ заказами, у которых интервал между покупками вырос вдвое, ещё лояльны, но теряют привычку. Мягкое напоминание о ценности вернёт частоту до прежней.',\n      basis: ['Интервал между покупками сегмента вырос с 24 до 52 дней', 'Сегмент даёт 31% всей выручки — терять его дороже всего', 'Похожие winback-кампании возвращают 12–18% уходящих'],\n      steps: [\n        { day: '0д', title: 'WhatsApp · подборка по любимой категории', sub: 'Без скидки — напоминание о ценности' },\n        { day: '5д', title: 'Нет реакции → WhatsApp', sub: 'Персональный бонус к следующему заказу' },\n        { day: '10д', title: 'Открыл, не купил → SMS', sub: 'Короткое предложение с дедлайном' },\n      ],\n      varA: 'Анна, мы скучаем! Подобрали новинки в вашей любимой категории — посмотрите, что появилось.',\n      varB: 'Анна, дарим 300 бонусов на следующий заказ. Они сгорят через 7 дней — успейте воспользоваться.',\n      whySegment: 'лояльные клиенты с растущим интервалом покупок — уход ещё не случился, привычку можно вернуть.',\n      whyMessage: 'сначала ценность без скидки — сегмент лоялен, скидка сразу приучает ждать её.',\n      whyChannel: 'WhatsApp — основной канал сегмента, 84% открытий; SMS только как финальный дедлайн.',\n      panel: { aud: '1 870 клиентов', control: '10% · 187', channels: 'WhatsApp → SMS', budget: '≈ 54 000 ₽', forecast: '+1,2 млн ₽' },\n      results: {\n        metrics: [\n          { label: 'Возвращено к покупкам', value: '+14,2%', note: 'от уходящего сегмента', green: true },\n          { label: 'Инкрементальная выручка', value: '1,08 млн ₽', note: 'сверх контрольной группы' },\n          { label: 'Окупаемость', value: '20×', note: 'на ₽1 затрат — ₽20' },\n          { label: 'Доп. заказов', value: '252', note: 'от удержанных клиентов' },\n        ],\n        testPct: '11,4%', ctrlPct: '6,9%', testH: 118, ctrlH: 71, pp: '+4,5 п.п.', metricName: 'к доле вернувшихся',\n        insight: 'Ценность без скидки сработала: вариант A обошёл бонусный на 9%, а бонус чаще возвращал тех, кто и так бы купил. Агент рекомендует в следующем запуске сократить бонусную ветку.',\n        facts: ['68% возвратов — по подборке любимой категории', 'Пик откликов — суббота, 10:00'],\n      },\n    },\n    {\n      title: 'Поднять чек лояльного ядра', best: false, conf: 'уверенность средняя', confHigh: false,\n      desc: 'Cross-sell к постоянным покупателям на основе истории заказов.',\n      clients: '2 400', forecast: '+0,92 млн ₽', channels: 'MAX',\n      hypothesis: 'Постоянные покупатели берут одни и те же категории. Персональные рекомендации сопутствующих товаров поднимут средний чек без скидок.',\n      basis: ['72% лояльных клиентов покупают только 1–2 категории', 'Сопутствующие товары есть в 88% заказов похожих клиентов', 'Cross-sell по истории заказов даёт +8–12% к чеку в рознице'],\n      steps: [\n        { day: '0д', title: 'MAX · персональные рекомендации', sub: 'Сопутствующие товары к последнему заказу' },\n        { day: '4д', title: 'Нет реакции → MAX', sub: 'Подборка «покупают вместе» с отзывами' },\n        { day: '9д', title: 'Открыл, не купил → MAX', sub: 'Напоминание с бесплатной доставкой' },\n      ],\n      varA: 'Анна, к вашим прошлым покупкам отлично подойдут эти товары — собрали персональную подборку.',\n      varB: 'Анна, покупатели с похожими заказами чаще всего добавляют это. Посмотрите — доставка бесплатно.',\n      whySegment: 'лояльное ядро с узкой корзиной — самый безопасный сегмент для допродаж, риска оттока нет.',\n      whyMessage: 'рекомендации из реальной истории заказов — без скидок, чтобы не размывать маржу.',\n      whyChannel: 'MAX — сегмент активно читает канал, стоимость контакта минимальная.',\n      panel: { aud: '2 400 клиентов', control: '10% · 240', channels: 'MAX', budget: '≈ 38 000 ₽', forecast: '+0,92 млн ₽' },\n      results: {\n        metrics: [\n          { label: 'Средний чек сегмента', value: '+9,1%', note: 'к базовому чеку 5 050 ₽', green: true },\n          { label: 'Инкрементальная выручка', value: '0,86 млн ₽', note: 'сверх контрольной группы' },\n          { label: 'Окупаемость', value: '23×', note: 'на ₽1 затрат — ₽23' },\n          { label: 'Заказов с допродажей', value: '540', note: 'добавили сопутствующие' },\n        ],\n        testPct: '5 510 ₽', ctrlPct: '5 050 ₽', testH: 118, ctrlH: 108, pp: '+460 ₽', metricName: 'к среднему чеку',\n        insight: 'Рекомендации по истории заказов сработали без скидок: вариант A дал конверсию выше на 15%. Социальное доказательство в варианте B усиливало клики, но не покупки.',\n        facts: ['MAX дал 91% всех допродаж при минимальной стоимости контакта', 'Лучшая связка — подборка сразу после доставки заказа'],\n      },\n    },\n  ];\n\n  order = ['welcome', 'import', 'analyzing', 'dashboard', 'campaign', 'results'];\n  labels = ['Цель', 'Данные', 'Анализ', 'Возможности', 'Кампания', 'Результат'];\n  allLogs = [\n    'Загружено 18 240 клиентов и 47 310 заказов',\n    'Профили объединены по телефону и email',\n    'Рассчитаны RFM, давность и частота покупок',\n    'Найдены точки оттока в жизненном цикле',\n    'Сформировано 3 гипотезы роста под вашу цель',\n    'Кампании готовы к запуску',\n  ];\n\n  go(screen) {\n    const idx = this.order.indexOf(screen);\n    this.setState(s => ({ screen, visited: Math.max(s.visited, idx) }));\n    if (screen === 'analyzing' && this.state.analyzeStep < this.allLogs.length) this.startAnalyze();\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  startAnalyze() {\n    this.setState({ analyzeStep: 0 });\n    clearInterval(this._t);\n    this._t = setInterval(() => {\n      this.setState(s => {\n        if (s.analyzeStep >= this.allLogs.length) { clearInterval(this._t); return null; }\n        return { analyzeStep: s.analyzeStep + 1 };\n      });\n    }, 620);\n  }\n\n  componentWillUnmount() { clearInterval(this._t); }\n\n  renderVals() {\n    const s = this.state;\n    const cur = this.order.indexOf(s.screen);\n    const done = s.analyzeStep >= this.allLogs.length;\n\n    const last = this.order.length - 1;\n    const stepper = this.order.map((name, i) => {\n      const reachable = i <= s.visited;\n      const isCur = i === cur;\n      const isDone = i < cur;\n      let cBg, cCol, cBorder;\n      if (isCur || isDone) { cBg = '#141416'; cCol = '#fff'; cBorder = 'none'; }\n      else { cBg = '#fff'; cCol = '#b0b2b8'; cBorder = '2px solid #dadbe0'; }\n      const lblCol = (isCur || isDone) ? '#16181d' : '#a8aab0';\n      const lblW = (isCur || isDone) ? '700' : '500';\n      const lineDark = i <= cur;\n      return {\n        label: this.labels[i],\n        mark: isDone ? '✓' : String(i + 1),\n        onClick: reachable ? () => this.go(name) : () => {},\n        btnStyle: `display:inline-flex;align-items:center;gap:10px;flex:none;background:none;border:none;padding:0;font-family:inherit;font-size:15px;cursor:${reachable ? 'pointer' : 'default'};`,\n        circleStyle: `width:26px;height:26px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;line-height:1;background:${cBg};color:${cCol};border:${cBorder};box-sizing:border-box;`,\n        labelStyle: `color:${lblCol};font-weight:${lblW};white-space:nowrap;`,\n        lineStyle: i === last ? 'display:none;' : `height:2px;flex:1;min-width:18px;margin:0 16px;border-radius:2px;background:${lineDark ? '#141416' : '#e2e2e6'};`,\n      };\n    });\n\n    return {\n      showWelcome: s.screen === 'welcome',\n      showImport: s.screen === 'import',\n      showAnalyzing: s.screen === 'analyzing',\n      showDashboard: s.screen === 'dashboard',\n      showCampaign: s.screen === 'campaign',\n      showResults: s.screen === 'results',\n\n      ...(() => {\n        const selCard = 'position:relative;border:1.5px solid #2dc56e;background:#f3fbf6;border-radius:18px;padding:22px;cursor:pointer;';\n        const offCard = 'position:relative;border:1.5px solid #ededf0;background:#fff;border-radius:18px;padding:22px;cursor:pointer;';\n        const selIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#2dc56e;color:#fff;';\n        const offIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#f1f1f3;color:#46484f;';\n        const mk = (key) => { const sel = s.goal === key; return { card: sel ? selCard : offCard, icon: sel ? selIcon : offIcon, sel }; };\n        const r = mk('repeat'), a = mk('reactivate'), c = mk('churn'), o = mk('aov');\n        return {\n          cRepeatCard: r.card, cRepeatIcon: r.icon, cRepeatSel: r.sel, cRepeatBadge: r.sel,\n          cReactCard: a.card, cReactIcon: a.icon, cReactSel: a.sel,\n          cChurnCard: c.card, cChurnIcon: c.icon, cChurnSel: c.sel,\n          cAovCard: o.card, cAovIcon: o.icon, cAovSel: o.sel,\n        };\n      })(),\n      pickRepeat: () => this.setState({ goal: 'repeat' }),\n      pickReactivate: () => this.setState({ goal: 'reactivate' }),\n      pickChurn: () => this.setState({ goal: 'churn' }),\n      pickAov: () => this.setState({ goal: 'aov' }),\n\n      goWelcome: () => this.go('welcome'),\n      goImport: () => this.go('import'),\n      goAnalyzing: () => this.go('analyzing'),\n      goDashboard: () => this.go('dashboard'),\n      goCampaign: () => this.go('campaign'),\n      launchCampaign: () => { this.setState({ resultPhase: 'live', paused: false }); this.go('results'); },\n      goHome: () => this.go(s.visited >= 3 ? 'dashboard' : 'welcome'),\n\n      goalSummary: this.goals[s.goal].summary,\n      goalTitle: this.goals[s.goal].title,\n\n      resultLive: s.resultPhase === 'live',\n      resultDone: s.resultPhase === 'done',\n      liveStatus: s.paused ? 'Кампания на паузе · день 1 из 21' : 'Кампания запущена · день 1 из 21',\n      liveSent: this.liveSentArr[s.sel],\n      liveBarStyle: `height:100%;width:38%;border-radius:99px;background:${s.paused ? '#f0a01e' : 'linear-gradient(90deg,#2dc56e,#15a85a)'};transition:background .3s;`,\n      livePaused: s.paused,\n      pauseLabel: s.paused ? 'Возобновить отправку' : 'Пауза',\n      togglePause: () => this.setState(st => ({ paused: !st.paused })),\n      stopCampaign: () => this.go('dashboard'),\n      finishDemo: () => this.setState({ resultPhase: 'done' }),\n\n      connectors: this.connectorNames.map(name => {\n        const sel = s.connector === name;\n        return {\n          name,\n          onClick: () => this.setState({ connector: sel ? null : name }),\n          style: `font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border-radius:10px;padding:8px 13px;${sel ? 'color:#16985a;border:1.5px solid #2dc56e;background:#f3fbf6;' : 'color:#46484f;border:1px solid #ededf0;background:#fff;'}`,\n        };\n      }),\n      connectorPicked: !!s.connector,\n      connectorNote: `${s.connector || ''} подключим после запуска — данные будут обновляться автоматически.`,\n\n      oppCards: this.opps.map((o, i) => {\n        const active = i === s.sel;\n        return {\n          best: o.best, conf: o.conf, title: o.title, desc: o.desc, clients: o.clients, forecast: o.forecast, channels: o.channels,\n          onClick: () => this.setState({ sel: i }),\n          btnClick: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.setState({ sel: i }); this.go('campaign'); },\n          cardStyle: `display:flex;align-items:center;gap:22px;border-radius:18px;padding:22px 24px;cursor:pointer;${active ? 'border:1.5px solid #2dc56e;background:#f3fbf6;' : 'border:1px solid #ededf0;background:#fff;'}`,\n          confStyle: `display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:${o.confHigh ? '#16985a' : '#8b8d93'};`,\n          forecastStyle: `font-size:18px;font-weight:800;color:${active ? '#16985a' : '#46484f'};`,\n          btnStyle: `display:flex;align-items:center;gap:9px;border-radius:12px;padding:13px 20px;font-size:14.5px;flex:none;cursor:pointer;${active ? 'background:#141416;color:#fff;font-weight:700;' : 'background:#fff;color:#46484f;border:1px solid #dcdce0;font-weight:600;'}`,\n        };\n      }),\n\n      ...(() => {\n        const o = this.opps[s.sel];\n        const r = o.results;\n        const next = this.opps[(s.sel + 1) % this.opps.length];\n        const tog = (on) => `width:34px;height:20px;border-radius:99px;border:none;padding:0;cursor:pointer;position:relative;flex:none;background:${on ? '#2dc56e' : '#d4d4d8'};`;\n        const knob = (on) => `position:absolute;top:2px;${on ? 'right:2px;' : 'left:2px;'}width:16px;height:16px;border-radius:50%;background:#fff;`;\n        return {\n          campTitle: o.title,\n          campHypothesis: o.hypothesis,\n          campBasis: o.basis.map(text => ({ text })),\n          campSteps: o.steps.map((st, i2) => ({\n            day: st.day, title: st.title, sub: st.sub,\n            dayStyle: `width:34px;height:34px;border-radius:10px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;${i2 === 0 ? 'background:#e7f8ef;color:#16985a;' : 'background:#f1f1f3;color:#46484f;'}`,\n            lineStyle: i2 === o.steps.length - 1 ? 'display:none;' : 'width:2px;flex:1;background:#ededf0;margin:4px 0;',\n            bodyStyle: i2 === o.steps.length - 1 ? '' : 'padding-bottom:18px;',\n          })),\n          campVarA: o.varA, campVarB: o.varB,\n          whySegment: o.whySegment, whyMessage: o.whyMessage, whyChannel: o.whyChannel,\n          panelAud: o.panel.aud, panelControl: o.panel.control, panelChannels: o.panel.channels, panelBudget: o.panel.budget, panelForecast: o.panel.forecast,\n          toggleFreq: () => this.setState(st => ({ tFreq: !st.tFreq })),\n          toggleTone: () => this.setState(st => ({ tTone: !st.tTone })),\n          tFreqStyle: tog(s.tFreq), tFreqKnob: knob(s.tFreq),\n          tToneStyle: tog(s.tTone), tToneKnob: knob(s.tTone),\n          resMetrics: r.metrics.map(m => ({ label: m.label, value: m.value, note: m.note, valStyle: `font-size:30px;font-weight:800;margin-top:6px;${m.green ? 'color:#16985a;' : ''}` })),\n          barTestPct: r.testPct, barCtrlPct: r.ctrlPct, barPP: r.pp, barMetricName: r.metricName,\n          barTestStyle: `width:100%;height:${r.testH}px;background:#2dc56e;border-radius:10px 10px 0 0;transform-origin:bottom;animation:growBar .7s ease both;`,\n          barCtrlStyle: `width:100%;height:${r.ctrlH}px;background:#dfe0e3;border-radius:10px 10px 0 0;transform-origin:bottom;animation:growBar .7s ease both;`,\n          resInsight: r.insight,\n          resFacts: r.facts.map(text => ({ text })),\n          nextTitle: next.title, nextClients: next.clients, nextForecast: next.forecast,\n          goNextOpp: () => { this.setState({ sel: (s.sel + 1) % this.opps.length }); this.go('dashboard'); },\n        };\n      })(),\n\n      stepper,\n      logLines: this.allLogs.slice(0, s.analyzeStep).map(t => ({ text: t })),\n      currentLog: this.allLogs[Math.min(s.analyzeStep, this.allLogs.length - 1)],\n      analyzing: !done,\n      analyzeDone: done,\n      progressStyle: `height:100%;background:linear-gradient(90deg,#2dc56e,#15a85a);border-radius:99px;width:${Math.round((s.analyzeStep / this.allLogs.length) * 100)}%;transition:width .5s ease;`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +

            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

div>\n        <h2 style=\"margin:0 0 6px; font-size:28px; font-weight:800; letter-spacing:-.02em;\">Вернуть клиентов после второго заказа<\u002Fh2>\n        <p style=\"margin:0 0 24px; font-size:15px; color:#8b8d93;\">Эффект подтверждён контрольной группой — это прирост от кампании, а не сезона.<\u002Fp>\n\n        <!-- metric cards -->\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">Повторные покупки<\u002Fdiv><div style=\"font-size:30px; font-weight:800; color:#16985a; margin-top:6px;\">+12,4%<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">цель была +15%<\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">Инкрементальная выручка<\u002Fdiv><div style=\"font-size:30px; font-weight:800; margin-top:6px;\">1,84 млн ₽<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">сверх контрольной группы<\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">Окупаемость<\u002Fdiv><div style=\"font-size:30px; font-weight:800; margin-top:6px;\">19×<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">на ₽1 затрат — ₽19<\u002Fdiv><\u002Fdiv>\n          <div style=\"border:1px solid #ededf0; border-radius:16px; padding:20px;\"><div style=\"font-size:13px; color:#8b8d93;\">Доп. заказов<\u002Fdiv><div style=\"font-size:30px; font-weight:800; margin-top:6px;\">312<\u002Fdiv><div style=\"font-size:12.5px; color:#8b8d93; margin-top:3px;\">от вернувшихся клиентов<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- control vs test -->\n        <div style=\"display:grid; grid-template-columns:300px 1fr; gap:22px; margin-top:20px;\">\n          <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n            <div style=\"font-size:15px; font-weight:700; margin-bottom:18px;\">Тест против контроля<\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-end; gap:28px; height:150px; padding:0 8px;\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n                <div style=\"font-size:16px; font-weight:800; color:#16985a;\">14,8%<\u002Fdiv>\n                <div style=\"width:100%; height:118px; background:#2dc56e; border-radius:10px 10px 0 0; transform-origin:bottom; animation:growBar .7s ease both;\"><\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#8b8d93;\">Тест<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n                <div style=\"font-size:16px; font-weight:800; color:#8b8d93;\">9,2%<\u002Fdiv>\n                <div style=\"width:100%; height:73px; background:#dfe0e3; border-radius:10px 10px 0 0; transform-origin:bottom; animation:growBar .7s ease both;\"><\u002Fdiv>\n                <div style=\"font-size:12.5px; color:#8b8d93;\">Контроль<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center; margin-top:16px; padding-top:14px; border-top:1px solid #f0f0f2; font-size:14px;\">Прирост <b style=\"color:#16985a;\">+5,6 п.п.<\u002Fb> к повторным покупкам<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border:1px solid #ededf0; border-radius:18px; padding:24px;\">\n            <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:14px;\"><span style=\"width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,#2dc56e,#15a85a); display:flex; align-items:center; justify-content:center;\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M13 2 4.5 13.5H11l-1 8.5L19.5 10H13l0-8Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:16px; font-weight:700;\">Что понял агент<\u002Fspan><\u002Fdiv>\n            <p style=\"margin:0 0 14px; font-size:15px; line-height:1.6; color:#2c2e34;\">Сработала персонализация по прошлому заказу: <b>вариант A дал отклик на 22% выше<\u002Fb> варианта B, поэтому на 4-й день агент перевёл на него 95% аудитории. Контрольная группа подтверждает: рост — заслуга кампании.<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <div style=\"display:flex; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>WhatsApp принёс 78% возвратов, SMS — остальные 22%<\u002Fdiv>\n              <div style=\"display:flex; gap:10px; font-size:14px; color:#46484f;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2dc56e\" stroke-width=\"2.4\"><path d=\"m5 12 5 5 9-10\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Лучшее окно отправки — вторник, 11:00<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- next best action -->\n        <div style=\"display:flex; align-items:center; gap:20px; margin-top:20px; background:linear-gradient(120deg,#16181d,#26282f); border-radius:20px; padding:24px 28px; color:#fff;\">\n          <div style=\"flex:1;\">\n            <div style=\"font-size:13px; font-weight:600; color:#9ea0a8; text-transform:uppercase; letter-spacing:.05em;\">Следующий шаг от агента<\u002Fdiv>\n            <div style=\"font-size:20px; font-weight:800; margin-top:5px;\">Расширить механику на сегмент «уходящие»<\u002Fdiv>\n            <div style=\"font-size:14px; color:#b9bbc2; margin-top:5px;\">1 870 клиентов · прогноз <b style=\"color:#3ddc81;\">+1,2 млн ₽<\u002Fb>. Агент уже подготовил план.<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ goDashboard }}\" style=\"display:inline-flex; align-items:center; gap:9px; background:#2dc56e; color:#fff; border:none; border-radius:12px; padding:14px 22px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; flex:none;\">К возможностям<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen: 'welcome', visited: 0, goal: 'repeat', analyzeStep: 0 };\n\n  order = ['welcome', 'import', 'analyzing', 'dashboard', 'campaign', 'results'];\n  labels = ['Цель', 'Данные', 'Анализ', 'Возможности', 'Кампания', 'Результат'];\n  allLogs = [\n    'Загружено 18 240 клиентов и 47 310 заказов',\n    'Профили объединены по телефону и email',\n    'Рассчитаны RFM, давность и частота покупок',\n    'Найдены точки оттока в жизненном цикле',\n    'Сформировано 3 гипотезы роста под вашу цель',\n    'Кампании готовы к запуску',\n  ];\n\n  go(screen) {\n    const idx = this.order.indexOf(screen);\n    this.setState(s => ({ screen, visited: Math.max(s.visited, idx) }));\n    if (screen === 'analyzing') this.startAnalyze();\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  startAnalyze() {\n    this.setState({ analyzeStep: 0 });\n    clearInterval(this._t);\n    this._t = setInterval(() => {\n      this.setState(s => {\n        if (s.analyzeStep >= this.allLogs.length) { clearInterval(this._t); return null; }\n        return { analyzeStep: s.analyzeStep + 1 };\n      });\n    }, 620);\n  }\n\n  componentWillUnmount() { clearInterval(this._t); }\n\n  renderVals() {\n    const s = this.state;\n    const cur = this.order.indexOf(s.screen);\n    const done = s.analyzeStep >= this.allLogs.length;\n\n    const last = this.order.length - 1;\n    const stepper = this.order.map((name, i) => {\n      const reachable = i <= s.visited;\n      const isCur = i === cur;\n      const isDone = i < cur;\n      let cBg, cCol, cBorder;\n      if (isCur || isDone) { cBg = '#141416'; cCol = '#fff'; cBorder = 'none'; }\n      else { cBg = '#fff'; cCol = '#b0b2b8'; cBorder = '2px solid #dadbe0'; }\n      const lblCol = (isCur || isDone) ? '#16181d' : '#a8aab0';\n      const lblW = (isCur || isDone) ? '700' : '500';\n      const lineDark = i <= cur;\n      return {\n        label: this.labels[i],\n        mark: isDone ? '✓' : String(i + 1),\n        onClick: reachable ? () => this.go(name) : () => {},\n        btnStyle: `display:inline-flex;align-items:center;gap:10px;flex:none;background:none;border:none;padding:0;font-family:inherit;font-size:15px;cursor:${reachable ? 'pointer' : 'default'};`,\n        circleStyle: `width:26px;height:26px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;line-height:1;background:${cBg};color:${cCol};border:${cBorder};box-sizing:border-box;`,\n        labelStyle: `color:${lblCol};font-weight:${lblW};white-space:nowrap;`,\n        lineStyle: i === last ? 'display:none;' : `height:2px;flex:1;min-width:18px;margin:0 16px;border-radius:2px;background:${lineDark ? '#141416' : '#e2e2e6'};`,\n      };\n    });\n\n    return {\n      showWelcome: s.screen === 'welcome',\n      showImport: s.screen === 'import',\n      showAnalyzing: s.screen === 'analyzing',\n      showDashboard: s.screen === 'dashboard',\n      showCampaign: s.screen === 'campaign',\n      showResults: s.screen === 'results',\n\n      ...(() => {\n        const selCard = 'position:relative;border:1.5px solid #2dc56e;background:#f3fbf6;border-radius:18px;padding:22px;cursor:pointer;';\n        const offCard = 'position:relative;border:1.5px solid #ededf0;background:#fff;border-radius:18px;padding:22px;cursor:pointer;';\n        const selIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#2dc56e;color:#fff;';\n        const offIcon = 'width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:#f1f1f3;color:#46484f;';\n        const mk = (key) => { const sel = s.goal === key; return { card: sel ? selCard : offCard, icon: sel ? selIcon : offIcon, sel }; };\n        const r = mk('repeat'), a = mk('reactivate'), c = mk('churn'), o = mk('aov');\n        return {\n          cRepeatCard: r.card, cRepeatIcon: r.icon, cRepeatSel: r.sel, cRepeatBadge: r.sel,\n          cReactCard: a.card, cReactIcon: a.icon, cReactSel: a.sel,\n          cChurnCard: c.card, cChurnIcon: c.icon, cChurnSel: c.sel,\n          cAovCard: o.card, cAovIcon: o.icon, cAovSel: o.sel,\n        };\n      })(),\n      pickRepeat: () => this.setState({ goal: 'repeat' }),\n      pickReactivate: () => this.setState({ goal: 'reactivate' }),\n      pickChurn: () => this.setState({ goal: 'churn' }),\n      pickAov: () => this.setState({ goal: 'aov' }),\n\n      goWelcome: () => this.go('welcome'),\n      goImport: () => this.go('import'),\n      goAnalyzing: () => this.go('analyzing'),\n      goDashboard: () => this.go('dashboard'),\n      goCampaign: () => this.go('campaign'),\n      launchCampaign: () => this.go('results'),\n\n      stepper,\n      logLines: this.allLogs.slice(0, s.analyzeStep).map(t => ({ text: t })),\n      currentLog: this.allLogs[Math.min(s.analyzeStep, this.allLogs.length - 1)],\n      analyzing: !done,\n      analyzeDone: done,\n      progressStyle: `height:100%;background:linear-gradient(90deg,#2dc56e,#15a85a);border-radius:99px;width:${Math.round((s.analyzeStep / this.allLogs.length) * 100)}%;transition:width .5s ease;`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Вовлечение.dc"}
  </script>
